apps:
  postgresql:
    user: nextcloud
    command: bin/service.postgresql.sh
    daemon: forking
    plugs:
    - network
    - network-bind
    restart-condition: always
    before: [php-fpm]

  redis:
    user: nextcloud
    daemon: simple
    command: bin/service.redis.sh
    restart-condition: always
    before: [php-fpm]

  nats:
    user: nextcloud
    daemon: simple
    command: bin/service.nats.sh
    plugs:
    - network
    - network-bind
    restart-condition: always
    before: [signaling]

  signaling:
    user: nextcloud
    daemon: simple
    command: bin/service.signaling.sh
    plugs:
    - network
    - network-bind
    restart-condition: always
    after: [nats]

  php-fpm:
    user: nextcloud
    command: bin/service.php-fpm.sh
    daemon: forking
    plugs:
    - network
    - network-bind
    restart-condition: always
    start-timeout: 600s
    after: [postgresql]
    before: [nginx]
  
  nginx:
    command: bin/service.nginx.sh
    user: nextcloud
    daemon: simple
    plugs:
    - network
    - network-bind
    restart-condition: always
    
  occ:
    command: bin/occ-runner

  psql:
    command: bin/psql.sh

  pgdumpall:
    command: bin/pg_dumpall.sh

  cron:
    command: bin/nextcloud-cron
  
  php:
    command: bin/php-runner

  storage-change:
    command: bin/cli storage-change

  access-change:
    command: bin/cli access-change

  backup-pre-stop:
    command: bin/cli backup-pre-stop

  restore-pre-start:
    command: bin/cli restore-pre-start

  restore-post-start:
    command: bin/cli restore-post-start

confinement: strict
description: Nextcloud
grade: stable
name: nextcloud
summary: Nextcloud
